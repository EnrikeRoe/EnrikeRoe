<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VirtualBox">
  <rect width="48" height="48" rx="12" fill="#0d1a2e"/>
  <rect width="48" height="48" rx="12" fill="none" stroke="#0070CE" stroke-width="1" opacity="0.5"/>
  <!-- Box 3D isometric -->
  <!-- top face -->
  <polygon points="24,8 38,16 24,24 10,16" fill="#0070CE" opacity="0.7"/>
  <!-- left face -->
  <polygon points="10,16 24,24 24,38 10,30" fill="#0070CE" opacity="0.4"/>
  <!-- right face -->
  <polygon points="38,16 24,24 24,38 38,30" fill="#0070CE" opacity="0.9"/>
  <!-- edges -->
  <polygon points="24,8 38,16 24,24 10,16" fill="none" stroke="#4aacff" stroke-width="0.75"/>
  <polygon points="10,16 24,24 24,38 10,30" fill="none" stroke="#4aacff" stroke-width="0.75"/>
  <polygon points="38,16 24,24 24,38 38,30" fill="none" stroke="#4aacff" stroke-width="0.75"/>
</svg>
