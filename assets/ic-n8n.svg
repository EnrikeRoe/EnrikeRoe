<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="n8n">
  <rect width="48" height="48" rx="12" fill="#1a0f00"/>
  <rect width="48" height="48" rx="12" fill="none" stroke="#EA4B00" stroke-width="1" opacity="0.5"/>
  <!-- n8n nodes connected -->
  <!-- left node -->
  <circle cx="13" cy="24" r="5" fill="#EA4B00"/>
  <!-- center node -->
  <circle cx="24" cy="24" r="6" fill="#EA4B00" opacity="0.85"/>
  <!-- right node -->
  <circle cx="35" cy="24" r="5" fill="#EA4B00"/>
  <!-- connectors -->
  <line x1="18" y1="24" x2="19" y2="24" stroke="#EA4B00" stroke-width="2"/>
  <line x1="29" y1="24" x2="30" y2="24" stroke="#EA4B00" stroke-width="2"/>
  <!-- 8 in center -->
  <text x="24" y="28" font-family="sans-serif" font-size="9" font-weight="700" fill="#1a0f00" text-anchor="middle">n8n</text>
</svg>
