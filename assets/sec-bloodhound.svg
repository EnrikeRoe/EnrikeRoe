<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="BloodHound">
  <rect width="48" height="48" rx="12" fill="#130000"/>
  <rect width="48" height="48" rx="12" fill="none" stroke="#CC0000" stroke-width="1" opacity="0.6"/>
  <!-- Hound head silhouette -->
  <!-- Ear left -->
  <path d="M13 14 Q10 8 15 12" stroke="#CC0000" stroke-width="1.5" fill="#CC0000" opacity="0.7"/>
  <!-- Ear right -->
